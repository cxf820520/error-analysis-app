# HTTPS 配置示例
server {
    listen 80;
    server_name example.com; # 替换为你的域名
    return 301 https://$host$request_uri; # 重定向 HTTP 到 HTTPS
}

server {
    listen 443 ssl http2;
    server_name example.com; # 替换为你的域名

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/example.com_bundle.crt; # 替换为你的证书路径
    ssl_certificate_key /etc/nginx/ssl/example.com.key; # 替换为你的私钥路径

    # SSL 协议配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL 会话配置
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头部
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # 根目录配置
    root /home/ubuntu/error-analysis-app/dist;
    index index.html;

    # 路由配置
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态文件配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
